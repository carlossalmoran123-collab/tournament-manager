<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>🏀 Tournament Manager</h1>
            <p>Plataforma de Gestión de Eventos Deportivos</p>
        </header>

        <!-- Navegación -->
        <nav class="nav-tabs">
            <button class="nav-btn active" data-section="dashboard">Dashboard</button>
            <button class="nav-btn" data-section="add-event">Agregar Evento</button>
            <button class="nav-btn" data-section="categories">Categorías</button>
        </nav>

        <!-- Dashboard -->
        <section id="dashboard" class="section active">
            <h2>📊 Dashboard</h2>
            <div id="categoriesGrid" class="categories-grid"></div>
        </section>

        <!-- Formulario de Evento -->
        <section id="add-event" class="section">
            <h2>➕ Agregar Nuevo Evento</h2>
            <form id="eventForm" class="event-form">
                <div class="form-group">
                    <label for="eventCategory">Categoría:</label>
                    <select id="eventCategory" required>
                        <option value="">-- Selecciona una categoría --</option>
                        <option value="micro-infantil">Micro Infantil</option>
                        <option value="pasarela">Pasarela</option>
                        <option value="cadetes">Cadetes</option>
                        <option value="juvenil">Juvenil</option>
                        <option value="juvenil-superior">Juvenil Superior</option>
                        <option value="sub21">Sub 21</option>
                        <option value="sub23">Sub 23</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="eventName">Nombre del Evento:</label>
                    <input id="eventName" type="text" placeholder="Ej: Torneo Regional 2026" required>
                </div>
                <div class="form-group">
                    <label for="eventDate">Fecha:</label>
                    <input id="eventDate" type="date" required>
                </div>
                <div class="form-group">
                    <label for="eventLocation">Ubicación:</label>
                    <input id="eventLocation" type="text" placeholder="Ej: Polideportivo Municipal" required>
                </div>
                <div class="form-group">
                    <label for="eventTeams">Cantidad de Equipos:</label>
                    <input id="eventTeams" type="number" min="2" placeholder="Ej: 8" required>
                </div>
                <div class="form-group">
                    <label for="competitionFormat">Formato:</label>
                    <select id="competitionFormat" required>
                        <option value="todos-contra-todos">Todos Contra Todos</option>
                        <option value="grupos">Por Grupos</option>
                        <option value="eliminacion">Eliminación Directa</option>
                        <option value="mixto">Mixto (Grupos + Eliminación)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="eventDescription">Descripción (opcional):</label>
                    <textarea id="eventDescription" placeholder="Detalles adicionales..."></textarea>
                </div>
                <button type="submit" class="btn-primary">✅ Crear Evento</button>
            </form>
        </section>

        <!-- Categorías -->
        <section id="categories" class="section">
            <h2>📂 Categorías</h2>
            <div id="categoryContainer" class="category-container"></div>
        </section>
    </div>

    <!-- Modal de Evento -->
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle"></h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
